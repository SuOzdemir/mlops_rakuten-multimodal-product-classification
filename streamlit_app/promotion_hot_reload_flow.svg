<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1220" viewBox="0 0 1600 1220" role="img" aria-labelledby="title description">
  <title id="title">Promotion gate and API hot reload flow</title>
  <desc id="description">The promotion container validates assets, pushes DVC data, creates and gates an MLflow candidate, deploys the champion bundle, and shows how FastAPI activates and uses the new bundle.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity=".11"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="green-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="red-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 400; fill: #64748b; }
      .dag-title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #1e293b; }
      .dag-sub { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 400; fill: #64748b; }
      .node-title { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; }
      .node-title-sm { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .node-sub { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 400; fill: #64748b; }
      .light-title { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; }
      .light-title-sm { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .light-sub { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 400; fill: #64748b; }
      .step { font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .6px; }
      .edge { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 600; fill: #475569; }
      .mono { font-family: Menlo, Consolas, monospace; font-size: 11px; font-weight: 400; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="1220" rx="24" fill="#f0fdf4"/>
  <text x="48" y="54" class="title">Promotion DAG · rakuten_model_promotion</text>
  <text x="48" y="82" class="subtitle">The register_gate_and_deploy task: DVC push, MLflow candidate gate, champion deployment, and restart-free API reload.</text>

  <rect x="40" y="112" width="1520" height="360" rx="20" fill="#fff" stroke="#dbe4f0" filter="url(#shadow)"/>
  <rect x="64" y="132" width="370" height="28" rx="14" fill="#f8fafc"/>
  <text x="249" y="151" text-anchor="middle" class="step" fill="#16a34a">TASK: REGISTER_GATE_AND_DEPLOY</text>

  <rect x="72" y="214" width="208" height="108" rx="15" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="176" y="248" text-anchor="middle" class="node-title">1 · Python / Validate</text>
  <text x="176" y="273" text-anchor="middle" class="node-sub">Image + text checkpoints</text>
  <text x="176" y="294" text-anchor="middle" class="node-sub">CamemBERT + tokenizer + maps</text>

  <path d="M280 268 H320" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="326" y="204" width="222" height="128" rx="15" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="437" y="238" text-anchor="middle" class="node-title-sm">2 · Python / Select metric</text>
  <text x="437" y="263" text-anchor="middle" class="node-sub">MODEL=image</text>
  <text x="437" y="283" text-anchor="middle" class="mono">image_best_macro_f1</text>
  <text x="437" y="307" text-anchor="middle" class="node-sub">MODEL=text → text_best_macro_f1</text>

  <path d="M548 268 H588" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="594" y="214" width="196" height="108" rx="15" fill="#ecfdf5" stroke="#16a34a" stroke-width="5"/>
  <text x="692" y="248" text-anchor="middle" class="node-title-sm">3 · DVC / Push checkpoint</text>
  <text x="692" y="273" text-anchor="middle" class="node-sub">dvc.yaml:train_image | train_text</text>
  <text x="692" y="294" text-anchor="middle" class="node-sub">checkpoint → MinIO dvc-data</text>

  <path d="M790 268 H830" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="836" y="194" width="240" height="148" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="956" y="230" text-anchor="middle" class="node-title-sm">4 · Python / Build bundle</text>
  <text x="956" y="255" text-anchor="middle" class="node-sub">New component checkpoint</text>
  <text x="956" y="276" text-anchor="middle" class="node-sub">+ unchanged component</text>
  <text x="956" y="297" text-anchor="middle" class="node-sub">+ CamemBERT/tokenizer</text>
  <text x="956" y="318" text-anchor="middle" class="node-sub">+ label/category maps</text>

  <path d="M1076 268 H1116" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="1122" y="194" width="236" height="148" rx="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="1240" y="230" text-anchor="middle" class="light-title-sm">5 · MLflow Registry / Candidate</text>
  <text x="1240" y="255" text-anchor="middle" class="light-sub">MLflow production-bundle run</text>
  <text x="1240" y="278" text-anchor="middle" class="light-sub">Create new model version</text>
  <text x="1240" y="301" text-anchor="middle" class="light-sub">Store component F1 tags</text>
  <text x="1240" y="324" text-anchor="middle" class="light-sub">Store gate reason</text>

  <path d="M1358 268 H1384" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <polygon points="1450,184 1534,268 1450,352 1366,268" fill="#f8fafc" stroke="#16a34a" stroke-width="2.5"/>
  <text x="1450" y="244" text-anchor="middle" class="node-title-sm">MLflow / F1 Gate</text>
  <text x="1450" y="269" text-anchor="middle" class="node-sub">candidate F1 ≥</text>
  <text x="1450" y="289" text-anchor="middle" class="node-sub">champion F1</text>
  <text x="1450" y="309" text-anchor="middle" class="node-sub">+ min gain?</text>

  <!-- fail -->
  <path d="M1450 352 V398 H1268" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#red-arrow)"/>
  <text x="1388" y="388" class="step" fill="#16a34a">FAIL</text>
  <rect x="1006" y="370" width="256" height="80" rx="14" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="1134" y="401" text-anchor="middle" class="node-title">Rejected</text>
  <text x="1134" y="424" text-anchor="middle" class="node-sub">Tag version as rejected</text>
  <text x="1134" y="442" text-anchor="middle" class="node-sub">Champion + API remain unchanged</text>

  <!-- pass path -->
  <path d="M1450 352 V502" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>
  <text x="1462" y="419" class="step" fill="#16a34a">PASS</text>

  <rect x="40" y="500" width="1520" height="352" rx="20" fill="#ffffff" stroke="#bbf7d0" filter="url(#shadow)"/>
  <rect x="64" y="520" width="236" height="28" rx="14" fill="#f8fafc"/>
  <text x="182" y="539" text-anchor="middle" class="step" fill="#16a34a">SUCCESSFUL DEPLOYMENT</text>

  <rect x="70" y="608" width="238" height="126" rx="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="189" y="645" text-anchor="middle" class="light-title-sm">6 · MLflow / Champion alias</text>
  <text x="189" y="671" text-anchor="middle" class="light-sub">champion → new version</text>
  <text x="189" y="695" text-anchor="middle" class="light-sub">deployment_status=production</text>

  <path d="M308 671 H350" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>

  <rect x="356" y="608" width="238" height="126" rx="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="475" y="645" text-anchor="middle" class="light-title">7 · MLflow / Download</text>
  <text x="475" y="671" text-anchor="middle" class="light-sub">models:/…@champion</text>
  <text x="475" y="695" text-anchor="middle" class="light-sub">MLflow artifacts → bundle</text>

  <path d="M594 671 H636" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>

  <rect x="642" y="608" width="238" height="126" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="761" y="645" text-anchor="middle" class="light-title-sm">8 · Filesystem / Atomic swap</text>
  <text x="761" y="671" text-anchor="middle" class="light-sub">Replace serving directory</text>
  <text x="761" y="695" text-anchor="middle" class="light-sub">Old bundle → new bundle</text>

  <path d="M880 671 H922" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>

  <rect x="928" y="608" width="238" height="126" rx="15" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="1047" y="645" text-anchor="middle" class="light-title-sm">9 · Python / Write manifest</text>
  <text x="1047" y="671" text-anchor="middle" class="light-sub">Write version + run_id</text>
  <text x="1047" y="695" text-anchor="middle" class="light-sub">deployment_manifest.json</text>

  <path d="M1166 671 H1208" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>

  <rect x="1214" y="586" width="318" height="170" rx="15" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="1373" y="625" text-anchor="middle" class="light-title-sm">10 · FastAPI / Hot reload</text>
  <text x="1373" y="653" text-anchor="middle" class="light-sub">_get_assets() reads manifest</text>
  <text x="1373" y="677" text-anchor="middle" class="light-sub">version/run_id changed?</text>
  <text x="1373" y="701" text-anchor="middle" class="light-sub">new_assets = load_assets()</text>
  <text x="1373" y="725" text-anchor="middle" class="light-sub">Swap active in-memory model</text>
  <rect x="1300" y="736" width="146" height="20" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1373" y="750" text-anchor="middle" class="step" fill="#16a34a">NO API RESTART</text>

  <text x="800" y="806" text-anchor="middle" class="node-sub">Hot reload is lazy: the first prediction after manifest change loads the new 1.2 GB bundle.</text>
  <!-- HOW THE NEW BUNDLE IS USED -->
  <rect x="40" y="880" width="1520" height="282" rx="20" fill="#ffffff" stroke="#bbf7d0" filter="url(#shadow)"/>
  <rect x="64" y="900" width="306" height="28" rx="14" fill="#f8fafc"/>
  <text x="217" y="919" text-anchor="middle" class="step" fill="#16a34a">HOW THE NEW BUNDLE IS USED</text>
  <text x="396" y="921" class="dag-title">Lazy activation on prediction</text>
  <text x="396" y="945" class="dag-sub">The bundle is installed during promotion, but it becomes active in memory on the first prediction that sees the new manifest.</text>

  <rect x="70" y="980" width="250" height="120" rx="15" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="195" y="1008" text-anchor="middle" class="node-title-sm">Filesystem / Installed bundle</text>
  <text x="195" y="1032" text-anchor="middle" class="mono">data/rakuten_streamlit_predictor/</text>
  <text x="195" y="1054" text-anchor="middle" class="node-sub">Image + text weights</text>
  <text x="195" y="1074" text-anchor="middle" class="node-sub">CamemBERT/tokenizer + maps</text>
  <text x="195" y="1094" text-anchor="middle" class="node-sub">deployment_manifest.json</text>

  <path d="M320 1040 H364" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="342" y="1028" text-anchor="middle" class="edge">request</text>

  <rect x="370" y="980" width="230" height="120" rx="15" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="485" y="1010" text-anchor="middle" class="light-title-sm">FastAPI / POST /predict</text>
  <text x="485" y="1036" text-anchor="middle" class="light-sub">Calls _get_assets()</text>
  <text x="485" y="1058" text-anchor="middle" class="light-sub">Reads manifest version + run_id</text>
  <text x="485" y="1082" text-anchor="middle" class="light-sub">Compares deployment identity</text>

  <path d="M600 1040 H644" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <polygon points="735,960 820,1040 735,1120 650,1040" fill="#f8fafc" stroke="#16a34a" stroke-width="2.5"/>
  <text x="735" y="1018" text-anchor="middle" class="node-title-sm">FastAPI / Manifest</text>
  <text x="735" y="1042" text-anchor="middle" class="node-sub">version/run_id</text>
  <text x="735" y="1062" text-anchor="middle" class="node-sub">changed?</text>

  <!-- unchanged manifest -->
  <path d="M820 1040 H846 V1006 H864" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="836" y="1027" text-anchor="middle" class="step" fill="#475569">NO</text>
  <rect x="870" y="960" width="240" height="92" rx="15" fill="#fff" stroke="#94a3b8"/>
  <text x="990" y="991" text-anchor="middle" class="node-title-sm">FastAPI / Reuse active assets</text>
  <text x="990" y="1017" text-anchor="middle" class="node-sub">No disk reload</text>
  <text x="990" y="1037" text-anchor="middle" class="node-sub">Continue with in-memory model</text>

  <!-- changed manifest -->
  <path d="M820 1040 H846 V1100 H864" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>
  <text x="836" y="1088" text-anchor="middle" class="step" fill="#16a34a">YES</text>
  <rect x="870" y="1054" width="240" height="92" rx="15" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="990" y="1085" text-anchor="middle" class="node-title-sm">FastAPI / load_assets()</text>
  <text x="990" y="1111" text-anchor="middle" class="node-sub">Acquire thread lock</text>
  <text x="990" y="1131" text-anchor="middle" class="node-sub">Load complete new bundle</text>

  <path d="M1110 1100 H1134" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>

  <rect x="1140" y="1054" width="190" height="92" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="1235" y="1085" text-anchor="middle" class="light-title-sm">Python / Memory swap</text>
  <text x="1235" y="1111" text-anchor="middle" class="light-sub">_assets = new_assets</text>
  <text x="1235" y="1131" text-anchor="middle" class="light-sub">Store deployment_id</text>

  <path d="M1110 1006 H1334" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1330 1100 H1334" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#green-arrow)"/>

  <rect x="1340" y="970" width="192" height="166" rx="15" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="1436" y="1001" text-anchor="middle" class="light-title-sm">PyTorch / Inference</text>
  <text x="1436" y="1027" text-anchor="middle" class="light-sub">Preprocess image + text</text>
  <text x="1436" y="1049" text-anchor="middle" class="light-sub">ConvNeXt + CamemBERT</text>
  <text x="1436" y="1071" text-anchor="middle" class="light-sub">Late-fusion probabilities</text>
  <text x="1436" y="1093" text-anchor="middle" class="light-sub">Return top-3 classes</text>
  <rect x="1350" y="1108" width="172" height="20" rx="10" fill="#f8fafc"/>
  <text x="1436" y="1122" text-anchor="middle" class="step" fill="#16a34a">NEW CHAMPION ACTIVE</text>

  <text x="800" y="1200" text-anchor="middle" class="node-sub">Source: promotion/promote.py · src/api/main.py · streamlit_app/services/raw_late_fusion_predictor.py</text>
</svg>
