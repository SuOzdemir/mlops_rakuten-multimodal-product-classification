<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="300" viewBox="0 0 1160 300" role="img" aria-labelledby="title desc">
  <title id="title">PSI prediction drift flow</title>
  <desc id="desc">The training reference and latest predictions are compared with PSI. Grafana alerts if PSI remains above 0.60 for two minutes.</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font: 700 18px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px Inter, Arial, sans-serif; fill: #64748b; }
      .label { font: 700 12px Inter, Arial, sans-serif; letter-spacing: 1px; fill: #16a34a; }
      .branch { font: 700 11px Inter, Arial, sans-serif; fill: #15803d; }
    </style>
  </defs>

  <rect width="1160" height="300" rx="22" fill="#f0fdf4"/>
  <text x="28" y="32" class="label">PREDICTION DRIFT · PSI</text>

  <rect x="28" y="62" width="220" height="78" rx="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="138" y="92" text-anchor="middle" class="title">Training reference</text>
  <text x="138" y="116" text-anchor="middle" class="body">Category distribution</text>

  <rect x="28" y="170" width="220" height="88" rx="13" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="138" y="200" text-anchor="middle" class="title">Live window</text>
  <text x="138" y="224" text-anchor="middle" class="body">Latest 200 predictions</text>
  <text x="138" y="245" text-anchor="middle" class="body">Demo 5 · production 30+</text>

  <path d="M248 101 L332 135" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M248 214 L332 172" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="340" y="112" width="190" height="86" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="435" y="147" text-anchor="middle" class="title">Calculate PSI</text>
  <text x="435" y="173" text-anchor="middle" class="body">Reference vs live</text>

  <path d="M530 155 H617" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M700 87 L780 155 L700 223 L620 155 Z" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="700" y="150" text-anchor="middle" class="title">PSI &gt; 0.60?</text>
  <text x="700" y="174" text-anchor="middle" class="body">for 2 minutes</text>

  <path d="M780 128 L864 101" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="820" y="100" text-anchor="middle" class="branch">YES</text>
  <rect x="872" y="62" width="250" height="78" rx="13" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="997" y="92" text-anchor="middle" class="title">Grafana alert</text>
  <text x="997" y="116" text-anchor="middle" class="body">Investigate drift signal</text>

  <path d="M780 182 L864 214" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="820" y="218" text-anchor="middle" class="branch">NO</text>
  <rect x="872" y="175" width="250" height="78" rx="13" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="997" y="205" text-anchor="middle" class="title">Keep monitoring</text>
  <text x="997" y="229" text-anchor="middle" class="body">Continue rolling window</text>
</svg>
