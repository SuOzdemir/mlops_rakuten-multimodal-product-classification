x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: rakuten-airflow:2.10.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Shared Postgres lives in the main docker-compose.yaml stack (own network) —
    # reached via host.docker.internal, same pattern as AIRFLOW_API_URL/MLFLOW_TRACKING_URI
    # below. Run `make up` (or at least `docker compose up -d postgres`) before this stack.
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@host.docker.internal:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Airflow pauses newly-discovered DAGs by default — without this, a fresh
    # stack silently queues /retrain runs forever since the scheduler skips
    # paused DAGs (queued state never advances, and blocks new retrain calls
    # via the duplicate-running-job check in src/api/retrain.py).
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth  # lets /retrain call the REST API
    RAKUTEN_PROJECT_DIR: ${RAKUTEN_PROJECT_DIR:-/project}
    CAMEMBERT_BASE_DIR: ${CAMEMBERT_BASE_DIR:-/project/data/rakuten_streamlit_predictor/text_model/camembert_run4}
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://host.docker.internal:5001}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../:/project:rw    # full project mounted so DAGs can read models/ and write data/
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # Scoped stand-in for the raw host Docker socket: airflow-scheduler talks
  # to this instead of /var/run/docker.sock directly, so a compromised/buggy
  # DAG task can create/start/stop containers (what DockerOperator needs to
  # launch the ephemeral trainer) but can't touch volumes, exec into other
  # containers, read secrets from other containers' env, or otherwise control
  # the whole host the way raw socket access would allow.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - POST=1
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password adminadmin
      --firstname Admin --lastname Admin --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
