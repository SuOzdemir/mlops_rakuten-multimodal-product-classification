global:
  scrape_interval: 5s

rule_files:
  - "rules.yml"

scrape_configs:
  # api running via `docker compose up` (docker network service name)
  - job_name: api-docker
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # api running via `make manual-up` (host process, reached from the
  # prometheus container through Docker Desktop's host gateway)
  - job_name: api-manual
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  # Optional sidecar started with `make evidently-up`. It does not replace the
  # API's existing prediction_drift_psi metric.
  - job_name: evidently-monitor
    metrics_path: /metrics
    static_configs:
      - targets: ["evidently-monitor:8002"]
