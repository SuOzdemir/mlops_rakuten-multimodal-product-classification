services:

  # Shared Postgres — backs both MLflow's tracking store (db: mlflow) and
  # Airflow's metadata db (db: airflow, reached via host.docker.internal from
  # the separate airflow_dst compose stack). Databases/users are created once
  # on first boot by scripts/postgres_init/create_databases.sql.
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
      MLFLOW_DB_PASSWORD: ${MLFLOW_DB_PASSWORD:?Set MLFLOW_DB_PASSWORD in .env}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:?Set AIRFLOW_DB_PASSWORD in .env}
      API_DB_PASSWORD: ${API_DB_PASSWORD:?Set API_DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_init/create_databases.sql:/docker-entrypoint-initdb.d/create_databases.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Lightweight browser UI for inspecting the shared PostgreSQL databases.
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # S3-compatible object storage for MLflow artifacts (and, later, a DVC
  # remote) -- replaces the bind-mounted ./mlruns dir. Ephemeral compute
  # (trainer) writes nothing to its own disk that needs to survive it.
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb -p local/mlflow-artifacts &&
      mc mb -p local/dvc-data &&
      echo 'buckets ready'
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5001"
    environment:
      # mlflow>=2.x rejects requests whose Host header isn't localhost/a private
      # IP (DNS-rebinding protection) — every client that reaches this container
      # via a docker-compose service name or host.docker.internal (api, streamlit,
      # and the airflow_dst stack's retrain DAG) got a silent 403 and tracking was
      # just dropped. An explicit MLFLOW_SERVER_ALLOWED_HOSTS allowlist works for
      # same-network callers (api -> mlflow:5001) but requests arriving via
      # host.docker.internal (Docker Desktop's host-forwarding proxy) still 403
      # even with the identical, allowed Host header — a Docker Desktop for Mac
      # NAT quirk, not something fixable from the allowlist. This is a local,
      # single-machine dev stack (local demo credentials are used throughout
      # already) so disabling the check entirely is the pragmatic fix.
      MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE: "true"
      # --serve-artifacts (below) proxies all artifact I/O through mlflow
      # itself, so only mlflow needs these MinIO credentials -- clients
      # (trainer, api, notebooks) never see them, they just talk to mlflow.
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD:?Set MLFLOW_DB_PASSWORD in .env}@postgres:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts/
      --serve-artifacts
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ephemeral training compute: born on `docker compose run --rm trainer`,
  # does its job (dvc repro -> logs to mlflow, which now writes to MinIO,
  # not this container's own disk), and is removed when it exits -- nothing
  # about the run is retained in the container itself. Not part of the
  # always-on stack (profiles: [trainer] keeps it out of `make up`/`up-all`).
  # mem_limit is a hard per-container cgroup cap, enforced regardless of how
  # much the Docker Desktop VM has free -- it must be raised together with
  # the VM's own total (Docker Desktop > Resources > Memory), not instead of.
  trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile
    profiles: ["trainer"]
    volumes:
      - .:/project
    environment:
      - MODEL=${MODEL:-image}
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - MLFLOW_REQUIRED=true
      - MAX_EPOCHS_OVERRIDE=${MAX_EPOCHS_OVERRIDE:-}
      - BATCH_SIZE_OVERRIDE=${BATCH_SIZE_OVERRIDE:-}
      - LEARNING_RATE_OVERRIDE=${LEARNING_RATE_OVERRIDE:-}
      - SEED_OVERRIDE=${SEED_OVERRIDE:-}
      - EARLY_STOPPING_PATIENCE_OVERRIDE=${EARLY_STOPPING_PATIENCE_OVERRIDE:-}
      - WEIGHT_DECAY_OVERRIDE=${WEIGHT_DECAY_OVERRIDE:-}
      - USE_AMP_OVERRIDE=${USE_AMP_OVERRIDE:-}
      - LABEL_SMOOTHING_OVERRIDE=${LABEL_SMOOTHING_OVERRIDE:-}
      - DROPOUT_OVERRIDE=${DROPOUT_OVERRIDE:-}
      - TRAIN_ROWS_OVERRIDE=${TRAIN_ROWS_OVERRIDE:-}
      - VAL_ROWS_OVERRIDE=${VAL_ROWS_OVERRIDE:-}
    mem_limit: 8g
    # PyTorch DataLoader workers (NUM_WORKERS=4) pass batches between
    # processes via /dev/shm; Docker's 64MB default is nowhere near enough
    # and fails with "unable to allocate shared memory" before training even
    # starts crunching numbers.
    shm_size: "2gb"
    depends_on:
      mlflow:
        condition: service_healthy

  # Ephemeral candidate packaging, DVC push, Registry gate, and deployment.
  # Airflow launches this image with DockerOperator; it is not always on.
  promotion:
    build:
      context: .
      dockerfile: promotion/Dockerfile
    profiles: ["promotion"]
    volumes:
      - .:/project
    environment:
      - MODEL=${MODEL:-text}
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - DVC_ENDPOINT_URL=http://minio:9000
      - PROMOTION_MIN_F1_GAIN=${PROMOTION_MIN_F1_GAIN:-0}
      - PROMOTION_ALLOW_UNTAGGED_CHAMPION=${PROMOTION_ALLOW_UNTAGGED_CHAMPION:-false}
    mem_limit: 8g
    shm_size: "2gb"
    depends_on:
      mlflow:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/rakuten_streamlit_predictor:/project/data/rakuten_streamlit_predictor:ro
    environment:
      # Auth users table, same shared postgres instance as mlflow/airflow
      # (db "api", created by scripts/postgres_init/create_databases.sql) —
      # replaces the old config/users.db SQLite file.
      - DATABASE_URL=postgresql://api:${API_DB_PASSWORD:?Set API_DB_PASSWORD in .env}@postgres:5432/api
      # Airflow lives in the separate airflow_dst compose stack (own network).
      - AIRFLOW_API_URL=${AIRFLOW_API_URL:-http://host.docker.internal:8080}
      - AIRFLOW_API_USER=${AIRFLOW_API_USER:?Set AIRFLOW_API_USER in .env}
      - AIRFLOW_API_PASSWORD=${AIRFLOW_API_PASSWORD:?Set AIRFLOW_API_PASSWORD in .env}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD:?Set API_ADMIN_PASSWORD in .env}
      - API_VIEWER_PASSWORD=${API_VIEWER_PASSWORD:?Set API_VIEWER_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Optional out-of-band drift monitor. It reads privacy-safe prediction
  # features from PostgreSQL and never sits on the live prediction request
  # path. Start explicitly with `make evidently-up`; the existing in-memory
  # PSI -> Prometheus -> Grafana path remains unchanged.
  evidently-monitor:
    build:
      context: .
      dockerfile: monitoring/evidently/Dockerfile
    profiles: ["evidently"]
    ports:
      - "8002:8002"
    volumes:
      - ./outputs/image_modeling:/reference:ro
      - evidently_reports:/reports
    environment:
      - DATABASE_URL=postgresql://api:${API_DB_PASSWORD:?Set API_DB_PASSWORD in .env}@postgres:5432/api
      - EVIDENTLY_REFERENCE_DATA=/reference/train_split.csv
      - EVIDENTLY_INTERVAL_SECONDS=${EVIDENTLY_INTERVAL_SECONDS:-60}
      - EVIDENTLY_WINDOW_SIZE=${EVIDENTLY_WINDOW_SIZE:-200}
      - EVIDENTLY_MIN_CURRENT_ROWS=${EVIDENTLY_MIN_CURRENT_ROWS:-5}
      - EVIDENTLY_REFERENCE_SAMPLE_SIZE=${EVIDENTLY_REFERENCE_SAMPLE_SIZE:-5000}
      - EVIDENTLY_PSI_THRESHOLD=${EVIDENTLY_PSI_THRESHOLD:-0.10}
      - EVIDENTLY_DRIFT_SHARE_THRESHOLD=${EVIDENTLY_DRIFT_SHARE_THRESHOLD:-0.50}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      - MINIO_SECURE=false
      - EVIDENTLY_MINIO_BUCKET=evidently-reports
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    entrypoint: ["/bin/sh", "/usr/local/bin/grafana-entrypoint.sh"]
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/entrypoint.sh:/usr/local/bin/grafana-entrypoint.sh:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning-base:ro
      - ./monitoring/grafana/provisioning-slack:/etc/grafana/provisioning-slack:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER in .env}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      # SMTP settings used by Grafana's provisioned email contact point.
      # Put credentials only in the local, gitignored .env file.
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME:-Rakuten MLOps Alerts}
      - GF_SMTP_SKIP_VERIFY=${GF_SMTP_SKIP_VERIFY:-false}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-recipient@example.com}
      # Slack Incoming Webhook URL for the drift-alert contact point
      # (monitoring/grafana/provisioning/alerting/contactpoints.yaml) --
      # set in a local, gitignored .env file, never hardcoded.
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    depends_on:
      - prometheus
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - MLFLOW_PUBLIC_URL=http://localhost:5001
      - AIRFLOW_PUBLIC_URL=http://localhost:8080
      - GRAFANA_PUBLIC_URL=http://localhost:3000
      - PROMETHEUS_PUBLIC_URL=http://localhost:9090
      - EVIDENTLY_PUBLIC_URL=http://localhost:8002
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      - MINIO_SECURE=false
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  minio_data:
  evidently_reports:
