services:

  # Shared Postgres — backs both MLflow's tracking store (db: mlflow) and
  # Airflow's metadata db (db: airflow, reached via host.docker.internal from
  # the separate airflow_dst compose stack). Databases/users are created once
  # on first boot by scripts/postgres_init/create_databases.sql.
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_init/create_databases.sql:/docker-entrypoint-initdb.d/create_databases.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # S3-compatible object storage for MLflow artifacts (and, later, a DVC
  # remote) -- replaces the bind-mounted ./mlruns dir. Ephemeral compute
  # (trainer) writes nothing to its own disk that needs to survive it.
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: creates the buckets MLflow/DVC need, then exits. Re-running is
  # a no-op (mc mb -p doesn't fail if the bucket already exists).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/mlflow-artifacts &&
      mc mb -p local/dvc-data &&
      echo 'buckets ready'
      "

  # Experiment tracking + Model Registry (Chapter 11).
  # Postgres backend store (not plain file store) is required for Model
  # Registry features (stages: Staging/Production, promotion rules).
  # Independent of api/streamlit — `docker compose up mlflow` on its own,
  # or `make up` to start the full stack (mlflow -> api -> streamlit).
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5001"
    environment:
      # mlflow>=2.x rejects requests whose Host header isn't localhost/a private
      # IP (DNS-rebinding protection) — every client that reaches this container
      # via a docker-compose service name or host.docker.internal (api, streamlit,
      # and the airflow_dst stack's retrain DAG) got a silent 403 and tracking was
      # just dropped. An explicit MLFLOW_SERVER_ALLOWED_HOSTS allowlist works for
      # same-network callers (api -> mlflow:5001) but requests arriving via
      # host.docker.internal (Docker Desktop's host-forwarding proxy) still 403
      # even with the identical, allowed Host header — a Docker Desktop for Mac
      # NAT quirk, not something fixable from the allowlist. This is a local,
      # single-machine dev stack (no DVC remote, admin/admin auth everywhere
      # already) so disabling the check entirely is the pragmatic fix.
      MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE: "true"
      # --serve-artifacts (below) proxies all artifact I/O through mlflow
      # itself, so only mlflow needs these MinIO credentials -- clients
      # (trainer, api, notebooks) never see them, they just talk to mlflow.
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts/
      --serve-artifacts
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ephemeral training compute: born on `docker compose run --rm trainer`,
  # does its job (dvc repro -> logs to mlflow, which now writes to MinIO,
  # not this container's own disk), and is removed when it exits -- nothing
  # about the run is retained in the container itself. Not part of the
  # always-on stack (profiles: [trainer] keeps it out of `make up`/`up-all`).
  # mem_limit is a hard per-container cgroup cap, enforced regardless of how
  # much the Docker Desktop VM has free -- it must be raised together with
  # the VM's own total (Docker Desktop > Resources > Memory), not instead of.
  trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile
    profiles: ["trainer"]
    volumes:
      - .:/project
    environment:
      - MODEL=${MODEL:-image}
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - MAX_EPOCHS_OVERRIDE=${MAX_EPOCHS_OVERRIDE:-}
      - TRAIN_ROWS_OVERRIDE=${TRAIN_ROWS_OVERRIDE:-}
      - VAL_ROWS_OVERRIDE=${VAL_ROWS_OVERRIDE:-}
    mem_limit: 8g
    # PyTorch DataLoader workers (NUM_WORKERS=4) pass batches between
    # processes via /dev/shm; Docker's 64MB default is nowhere near enough
    # and fails with "unable to allocate shared memory" before training even
    # starts crunching numbers.
    shm_size: "2gb"
    depends_on:
      mlflow:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/rakuten_streamlit_predictor:/project/data/rakuten_streamlit_predictor:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      # Auth users table, same shared postgres instance as mlflow/airflow
      # (db "api", created by scripts/postgres_init/create_databases.sql) —
      # replaces the old config/users.db SQLite file.
      - DATABASE_URL=postgresql://api:api@postgres:5432/api
      # Airflow lives in the separate airflow_dst compose stack (own network).
      - AIRFLOW_API_URL=${AIRFLOW_API_URL:-http://host.docker.internal:8080}
      - AIRFLOW_API_USER=${AIRFLOW_API_USER:-admin}
      - AIRFLOW_API_PASSWORD=${AIRFLOW_API_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Slack Incoming Webhook URL for the drift-alert contact point
      # (monitoring/grafana/provisioning/alerting/contactpoints.yaml) --
      # set in a local, gitignored .env file, never hardcoded.
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    depends_on:
      - prometheus
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  minio_data:
